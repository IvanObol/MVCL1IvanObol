<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('Wyszukiwanie - Kinoza')}"></head>
<body>

<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="section-card">
    <span class="badge-custom">Wyszukiwanie</span>
    <h2 class="fw-bold mb-3" style="letter-spacing:-0.01em;">
        <span th:if="${#strings.isEmpty(query)}">Wszystkie filmy</span>
        <span th:if="${!#strings.isEmpty(query)}">
            Wyniki dla „<span th:text="${query}" data-testid="search-query">…</span>"
        </span>
    </h2>
    <p class="text-muted small mb-4">
        Znaleziono <strong th:text="${#lists.size(results)}" data-testid="search-count">0</strong>
        <span th:text="${#lists.size(results) == 1 ? 'film' : 'filmów'}">filmów</span>.
    </p>

    <!-- inline search input -->
    <form action="/search" method="get" class="search-bar mb-4">
        <input type="text" name="q" th:value="${query}"
               placeholder="Szukaj po tytule, gatunku lub reżyserze..."
               data-testid="search-input" autofocus>
        <button type="submit" class="btn-reserve-main" data-testid="search-submit">Szukaj</button>
    </form>

    <div th:if="${results.isEmpty()}" class="empty-tickets">
        <div style="font-size:42px;line-height:1;">🔍</div>
        <p class="mt-2 mb-1 fw-bold">Nic nie znaleziono</p>
        <p class="text-muted small m-0">Spróbuj innego zapytania albo <a href="/" class="text-dark">wróć na stronę główną</a>.</p>
    </div>

    <div class="row g-3" data-testid="search-results">
        <div class="col-md-6 col-lg-4" th:each="m : ${results}">
            <a th:href="@{/movie/{id}(id=${m.id})}" class="text-decoration-none">
                <div class="search-card">
                    <img th:src="${m.posterUrl}" alt="" class="search-poster">
                    <div class="flex-grow-1">
                        <h6 class="fw-bold m-0" th:text="${m.title}">Tytuł</h6>
                        <small class="text-muted"
                               th:text="${m.genre + ' · ' + m.duration + ' min · ' + m.ageLimit}">info</small>
                        <div class="mt-2 small d-flex justify-content-between">
                            <span style="color:#b88a00;">★ <span th:text="${m.rating}">8.0</span></span>
                            <span th:if="${m.status?.name() == 'NOW_PLAYING'}"
                                  style="background:#262626;color:#FAFFBE;border-radius:999px;padding:2px 10px;font-size:11px;">
                                Teraz w kinie
                            </span>
                            <span th:if="${m.status?.name() == 'COMING_SOON'}"
                                  style="background:rgba(0,0,0,0.1);border-radius:999px;padding:2px 10px;font-size:11px;">
                                Wkrótce
                            </span>
                        </div>
                    </div>
                </div>
            </a>
        </div>
    </div>
</div>

<div th:replace="~{fragments/footer :: footer}"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script th:replace="~{fragments/navbar :: navbarScript}"></script>

<style>
    .search-bar {
        display: flex; gap: 10px;
        background: rgba(0,0,0,0.05);
        border-radius: 999px;
        padding: 6px 6px 6px 22px;
        align-items: center;
    }
    .search-bar input {
        flex: 1;
        background: transparent;
        border: none;
        outline: none;
        font-size: 15px;
        font-family: inherit;
        color: #000;
        padding: 8px 0;
    }
    .search-bar input::placeholder { color: rgba(0,0,0,0.4); }
    .search-bar button { padding: 10px 26px; font-size: 14px; }

    .search-card {
        background: #FDFFD1;
        border: 1px solid rgba(0,0,0,0.08);
        border-radius: 16px;
        padding: 14px;
        display: flex;
        gap: 12px;
        height: 100%;
        color: #000;
        transition: transform 0.15s, box-shadow 0.15s;
    }
    .search-card:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(0,0,0,0.12); }
    .search-poster {
        width: 70px; height: 105px;
        object-fit: cover; border-radius: 8px; flex-shrink: 0;
    }
    .empty-tickets {
        background: rgba(0,0,0,0.05);
        border-radius: 16px;
        padding: 24px;
        text-align: center;
    }
</style>
</body>
</html>
