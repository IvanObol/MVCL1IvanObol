<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('Logowanie - Kinoza')}"></head>
<body>

<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="section-card" style="max-width:500px;">
    <h2 class="fw-bold mb-3">Zaloguj się</h2>
    <p class="text-muted small">Demo: wpisz <code>ivan</code> aby zalogować się jako użytkownik, lub <code>admin</code> aby uzyskać panel admina.</p>

    <form action="/login" method="post">
        <label class="form-label">Login</label>
        <input class="kinoza-input mb-3" name="username" placeholder="ivan lub admin" required autofocus>

        <button type="submit" class="btn-reserve-main w-100">Zaloguj →</button>
    </form>

    <div class="mt-3 small text-muted">
        Bez hasła, to projekt demonstracyjny.
    </div>
</div>

<div th:replace="~{fragments/footer :: footer}"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script th:replace="~{fragments/navbar :: navbarScript}"></script>
</body>
</html>
