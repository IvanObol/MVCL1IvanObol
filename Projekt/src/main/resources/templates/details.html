<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${movie.title}">Detale filmu</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <style>
        body { background-color: #000; color: #fff; padding: 60px 0; }
        .movie-container {
            background-color: #1a1a1a;
            border-radius: 20px;
            padding: 40px;
            border: 1px solid #333;
        }
        .movie-info-label {
            color: #ffffff !important;
        }
        .big-poster {
            width: 100%;
            border-radius: 15px;
            box-shadow: 0 0 30px rgba(0,0,0,0.5);
        }
        .rating-badge {
            background-color: #ffc107;
            color: #000;
            padding: 5px 15px;
            border-radius: 20px;
            font-weight: bold;
            display: inline-block;
        }
        .btn-back {
            color: #888;
            text-decoration: none;
            margin-bottom: 20px;
            display: inline-block;
        }
        .btn-back:hover { color: #fff; }
        .description { color: #ffffff; line-height: 1.6; font-size: 1.1rem; }
    </style>
</head>
<body>

<div class="container">
    <a href="/" class="btn-back">← POWRÓT DO REPERTUARU</a>

    <div class="movie-container row">
        <div class="col-md-5">
            <img th:src="${movie.posterUrl}" class="big-poster" alt="Poster">
        </div>

        <div class="col-md-7 ps-md-5">
            <h1 class="display-4 fw-bold mb-3" th:text="${movie.title}">Tytuł</h1>

            <div class="mb-4">
                <span class="rating-badge">★ <span th:text="${movie.rating}">0.0</span></span>
                <span class="ms-3 movie-info-label" th:text="${movie.genre}">Gatunek</span>
            </div>

            <h5 class="movie-info-label">Reżyser: <span class="text-white" th:text="${movie.director}">Reżyser</span></h5>

            <hr class="my-4" style="border-color: #444;">

            <p class="description" th:text="${movie.description}">
                Tutaj pojawi się opis filmu...
            </p>

            <div class="mt-5 text-center">
                <a th:href="@{/movie/{id}/hall(id=${movie.id})}"
                   class="btn btn-light btn-lg px-5 py-3 fw-bold shadow text-uppercase"
                   style="letter-spacing: 2px;">
                    Wybierz miejsca
                </a>
            </div>
        </div>
    </div>
</div>

</body>
</html>
