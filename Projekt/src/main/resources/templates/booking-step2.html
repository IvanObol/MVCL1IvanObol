<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('Wybierz miejsce - Kinoza')}"></head>
<body>

<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="section-card">
    <div class="row g-4 align-items-stretch">

        <!-- info o kroku -->
        <div class="col-lg-5 d-flex flex-column">
            <a href="javascript:history.back()"
               class="text-muted text-decoration-none mb-3"
               data-testid="booking-back-link">← Wróć</a>

            <span class="step-indicator">Krok 2</span>
            <h2 class="fw-bold mt-2 mb-3">Wybierz miejsce</h2>

            <p class="m-0" data-testid="booking-step2-meta">
                <strong th:text="${showing.movie.title}">Film</strong> ·
                <span th:text="${showing.cinema.name}">Kino</span> ·
                Sala <span th:text="${showing.hallNumber}">3</span> ·
                <span th:text="${#temporals.format(showing.startTime, 'dd.MM.yyyy HH:mm')}">data</span>
            </p>

            <p class="text-muted mt-3 small">
                Mozesz wybrac kilka miejsc na raz - cena rosnie razem z iloscia biletow.
                Kliknij ponownie, zeby odznaczyc miejsce.
            </p>

            <!-- Podsumowanie wyboru -->
            <div class="mt-4 p-3" style="background:#F0F6AF;border-radius:14px;">
                <div class="d-flex justify-content-between">
                    <span>Wybrane miejsca</span>
                    <span class="fw-bold">
                        <span id="seatCount" data-testid="seat-count">0</span> szt.
                    </span>
                </div>
                <div class="small text-muted mt-1" id="seatList" data-testid="seat-list">
                    Nic jeszcze nie wybrano.
                </div>
                <hr class="my-2">
                <div class="d-flex justify-content-between">
                    <span>Cena za bilet</span>
                    <span><span th:text="${ticketPrice}">28</span> zl</span>
                </div>
                <div class="d-flex justify-content-between fw-bold mt-1">
                    <span>Razem</span>
                    <span><span id="totalPrice" data-testid="total-price">0</span> zl</span>
                </div>
            </div>

            <form th:action="@{/bilety/seats/reserve}" method="post" id="seatForm" class="mt-auto pt-4">
                <!-- Kazde miejsce odzielny imput -->
                <div id="seatInputs"></div>
                <button type="submit"
                        id="nextBtn"
                        class="btn-reserve-main d-none"
                        data-testid="booking-step2-submit">
                    Przejdz do platnosci &rarr;
                </button>
            </form>
        </div>

        <!-- Sala -->
        <div class="col-lg-7">
            <div class="hall-card">
                <div class="screen-label">EKRAN</div>
                <div class="screen-bar"></div>

                <div class="seat-grid" data-testid="seat-grid">
                    <button type="button"
                            th:each="s : ${seats}"
                            class="seat-btn"
                            th:disabled="${s.reserved}"
                            th:data-seat-id="${s.id}"
                            th:data-row="${s.rowNum}"
                            th:data-seat="${s.seatNum}"
                            th:title="'Rzad ' + ${s.rowNum} + ', miejsce ' + ${s.seatNum}"
                            th:text="${s.seatNum}">
                    </button>
                </div>

                <div class="d-flex justify-content-center flex-wrap gap-3 mt-4 small">
                    <span><span class="legend-box legend-free"></span> Wolne</span>
                    <span><span class="legend-box legend-selected"></span> Wybrane</span>
                    <span><span class="legend-box legend-taken"></span> Zajete</span>
                </div>
            </div>
        </div>
    </div>
</div>

<div th:replace="~{fragments/footer :: footer}"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script th:replace="~{fragments/navbar :: navbarScript}"></script>

<script th:inline="javascript">
    const TICKET_PRICE = /*[[${ticketPrice}]]*/ 28;

    const selected = new Map(); // seatId -> {row, seat}

    const seatCountEl = document.getElementById('seatCount');
    const seatListEl  = document.getElementById('seatList');
    const totalPriceEl = document.getElementById('totalPrice');
    const seatInputsEl = document.getElementById('seatInputs');
    const nextBtn      = document.getElementById('nextBtn');

    function refresh() {
        const count = selected.size;
        seatCountEl.textContent = count;
        totalPriceEl.textContent = count * TICKET_PRICE;

        if (count === 0) {
            seatListEl.textContent = 'Nic jeszcze nie wybrano.';
        } else {
            const parts = [...selected.values()]
                .sort((a, b) => a.row - b.row || a.seat - b.seat)
                .map(v => `rz. ${v.row} m. ${v.seat}`);
            seatListEl.textContent = parts.join(' · ');
        }

        // hidden inputs
        seatInputsEl.innerHTML = '';
        for (const id of selected.keys()) {
            const inp = document.createElement('input');
            inp.type = 'hidden';
            inp.name = 'seatIds';
            inp.value = id;
            seatInputsEl.appendChild(inp);
        }

        nextBtn.classList.toggle('d-none', count === 0);
    }

    document.querySelectorAll('.seat-btn:not(:disabled)').forEach(btn => {
        btn.addEventListener('click', () => {
            const id = btn.dataset.seatId;
            if (selected.has(id)) {
                selected.delete(id);
                btn.classList.remove('is-selected');
            } else {
                selected.set(id, {
                    row: parseInt(btn.dataset.row),
                    seat: parseInt(btn.dataset.seat)
                });
                btn.classList.add('is-selected');
            }
            refresh();
        });
    });
</script>

<style>
    /* Lokalne style dla step2 - layout sali jak na Figma */
    .hall-card {
        background: #FDFFD1;
        border: 1px solid rgba(0,0,0,0.08);
        border-radius: 22px;
        padding: 30px 24px;
    }
    .screen-label {
        text-align: center;
        font-size: 13px;
        letter-spacing: 0.2em;
        color: #6b6b3a;
        margin-bottom: 6px;
        text-transform: uppercase;
    }
    .seat-grid {
        display: grid;
        grid-template-columns: repeat(8, 1fr);
        gap: 8px;
        max-width: 460px;
        margin: 18px auto 0;
    }
    .legend-box {
        display:inline-block; width:14px; height:14px;
        border-radius:4px; vertical-align:middle; margin-right:4px;
    }
    .legend-free     { background:#FAFFBE; border:1px solid rgba(0,0,0,0.15); }
    .legend-selected { background:#262626; }
    .legend-taken    { background:#555; }
</style>

</body>
</html>
