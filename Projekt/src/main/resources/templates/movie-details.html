<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head(${movie.title})}"></head>
<body>

<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="section-card p-0 overflow-hidden">
    <div class="row g-0">
        <!-- info -->
        <div class="col-md-7 p-5">
            <div class="d-flex flex-wrap gap-2 align-items-center mb-3">
                <h1 class="fw-bold mb-0 me-3" th:text="${movie.title}">Tytuł</h1>
            </div>
            <div class="d-flex flex-wrap gap-2 mb-4">
                <span class="badge-custom" th:text="${movie.genre}">Gatunek</span>
                <span class="badge-custom" th:text="${movie.duration} + ' min'">82 min</span>
                <span class="badge-custom" th:text="${movie.ageLimit}">12+</span>
                <span class="badge-custom" th:text="${movie.country}">Polska</span>
                <span class="badge-custom" th:text="${movie.releaseYear}">2025</span>
                <span class="badge-custom" th:text="${movie.language}">PL</span>
                <span class="badge-custom" th:text="${movie.format}">2D</span>
            </div>

            <p style="font-size:18px;line-height:1.5;font-style:italic;"
               th:text="'“ ' + ${movie.description} + ' ”'">opis</p>

            <a href="#komentarze" class="fw-bold text-dark">Dowiedz się więcej →</a>

            <div class="d-flex gap-3 mt-5 flex-wrap">
                <a th:href="@{/bilety/{id}(id=${movie.id})}"
                   class="btn-reserve-main shadow">Zaplanuj seans</a>

                <!-- Chce obejrzec / Usun z listy -->
                <form th:if="${session.currentUser != null and !inWishlist}"
                      th:action="@{/movie/{id}/wishlist/add(id=${movie.id})}" method="post" class="d-inline">
                    <button type="submit" class="btn-outline-main" data-testid="add-wishlist-btn">
                        + Chcę obejrzeć
                    </button>
                </form>
                <form th:if="${session.currentUser != null and inWishlist}"
                      th:action="@{/movie/{id}/wishlist/remove(id=${movie.id})}" method="post" class="d-inline">
                    <button type="submit" class="btn-reserve-main"
                            style="background:#FAFFBE;color:#262626!important;border-color:#262626;"
                            data-testid="remove-wishlist-btn">
                        ✓ Na liście „Chcę obejrzeć"
                    </button>
                </form>
                <a th:if="${session.currentUser == null}" href="/login"
                   class="btn-outline-main" data-testid="add-wishlist-login">
                    + Chcę obejrzeć
                </a>
            </div>
        </div>

        <!-- Poster -->
        <div class="col-md-5 p-3">
            <img th:src="${movie.posterUrl}" alt=""
                 style="width:100%;height:600px;object-fit:cover;border-radius:20px;">
        </div>
    </div>
</div>

<!-- Komentarze -->
<div class="section-card" id="komentarze">
    <h3 class="fw-bold mb-4">Ostatnie komentarze</h3>

    <div class="row g-3">
        <div class="col-md-6" th:each="r : ${reviews}">
            <div class="inner-dark-card h-100">
                <div class="d-flex justify-content-between mb-2">
                    <span style="color:#ffc107;font-weight:700;">★ <span th:text="${r.stars}">5</span></span>
                    <small style="color:#aaa;"
                           th:text="${#temporals.format(r.createdAt, 'dd.MM.yyyy')}">data</small>
                </div>
                <div class="fw-bold mb-2" th:text="${r.authorName}" style="color:#FAFFBE;">Autor</div>
                <p class="m-0 small" th:text="${r.text}" style="color:#eaeaea;">Tekst...</p>
            </div>
        </div>
        <div th:if="${reviews.isEmpty()}" class="text-center p-4">
            <p class="text-muted">Brak komentarzy. Bądź pierwszy!</p>
        </div>
    </div>

    <!-- dodaj komentarz -->
    <hr class="my-4">
    <h5 class="fw-bold mb-3">Dodaj swój komentarz</h5>

    <div th:if="${session.currentUser == null}" class="alert alert-warning">
        <a href="/login">Zaloguj się</a>, aby dodać komentarz.
    </div>

    <form th:if="${session.currentUser != null}"
          th:action="@{/movie/{id}/comment(id=${movie.id})}" method="post">
        <div class="mb-3">
            <label class="form-label">Ocena</label>
            <select name="stars" class="kinoza-input" required>
                <option value="5">★★★★★ — Świetny</option>
                <option value="4">★★★★ — Dobry</option>
                <option value="3">★★★ — Średni</option>
                <option value="2">★★ — Słaby</option>
                <option value="1">★ — Bardzo słaby</option>
            </select>
        </div>
        <div class="mb-3">
            <textarea name="text" class="kinoza-input" rows="3" required
                      placeholder="Twoja opinia o filmie..."></textarea>
        </div>
        <button type="submit" class="btn-reserve-main">Wyślij komentarz</button>
    </form>
</div>

<div th:replace="~{fragments/footer :: footer}"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script th:replace="~{fragments/navbar :: navbarScript}"></script>
</body>
</html>
