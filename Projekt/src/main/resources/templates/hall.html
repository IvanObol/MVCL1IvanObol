<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Wybór miejsc - CinemaT</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <style>
        body { background-color: #000; color: #fff; text-align: center; padding-top: 50px; }
        .screen {
            width: 70%; height: 10px; background: #fff; margin: 0 auto 50px;
            box-shadow: 0 10px 20px rgba(255,255,255,0.3); border-radius: 5px;
        }
        .hall-container { max-width: 800px; margin: 0 auto; }
        .seat-grid { display: grid; grid-template-columns: repeat(10, 1fr); gap: 10px; }
        .btn-seat { width: 50px; height: 50px; font-size: 0.7rem; padding: 0; }
        .btn-back { color: #888; text-decoration: none; margin-bottom: 30px; display: inline-block; }
    </style>
</head>
<body>

<div class="container">
    <a th:href="@{/movie/{id}(id=${movie.id})}" class="btn-back">← POWRÓT DO OPISU</a>

    <h2 class="mb-5">Wybierz miejsca na film: <span th:text="${movie.title}">Tytuł</span></h2>

    <div class="hall-container">
        <p class="text-muted mb-2">EKRAN</p>
        <div class="screen"></div>

        <div class="seat-grid">
            <div th:each="seat : ${movie.seats}">
                <form th:action="@{/movie/{mId}/reserve/{sId}(mId=${movie.id}, sId=${seat.id})}" method="post">
                    <button type="submit"
                            th:disabled="${seat.isReserved}"
                            th:class="${seat.isReserved} ? 'btn btn-danger btn-seat' : 'btn btn-outline-success btn-seat'"
                            th:text="'R' + ${seat.rowNum} + ' M' + ${seat.seatNum}">
                    </button>
                </form>
            </div>
        </div>
    </div>
</div>

</body>
</html>
