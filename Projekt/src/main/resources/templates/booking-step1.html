<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('Wybierz seans - Kinoza')}"></head>
<body>

<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="section-card">
    <a href="/" class="text-muted text-decoration-none">← Wróć</a>

    <div class="mt-3">
        <span class="step-indicator">Krok 1</span>
        <h2 class="fw-bold mt-2">Wybierz seans</h2>
        <p>Dopasuj kino, datę i godzinę projekcji, a następnie zarezerwuj najlepsze miejsca na sali.</p>
    </div>

    <div class="d-flex flex-wrap align-items-center gap-2 mt-3 mb-4 p-3"
         style="background:#F0F6AF;border-radius:14px;">
        <img th:src="${movie.posterUrl}" alt=""
             style="width:60px;height:80px;object-fit:cover;border-radius:8px;">
        <div>
            <h5 class="fw-bold m-0" th:text="${movie.title}">Tytuł</h5>
            <small th:text="${movie.genre + ' · ' + movie.duration + ' min · ' + movie.ageLimit}">info</small>
        </div>
    </div>

    <form th:action="@{/bilety/{id}/wybierz(id=${movie.id})}" method="post" id="bookingForm">
        <input type="hidden" name="showingId" id="showingId" required>

        <!-- Kina -->
        <h5 class="fw-bold mb-2">Wybierz kino</h5>
        <div class="d-flex flex-wrap" id="cinemaList">
            <button type="button" class="choice-btn cinema-btn"
                    th:each="c : ${cinemas}"
                    th:data-cinema-id="${c.id}"
                    th:text="${c.name}">Kinoza</button>
        </div>

        <!-- Daty -->
        <h5 class="fw-bold mt-4 mb-2">Wybierz datę</h5>
        <div class="d-flex flex-wrap" id="dateList">
            <span class="text-muted">Najpierw wybierz kino ↑</span>
        </div>

        <!-- Godziny seansow -->
        <h5 class="fw-bold mt-4 mb-2">Wybierz godzinę</h5>
        <div class="d-flex flex-wrap" id="timeList">
            <span class="text-muted">Najpierw wybierz datę ↑</span>
        </div>

        <button type="submit" id="submitBtn"
                class="btn-reserve-main mt-4 d-none">Przejdź do wyboru miejsc →</button>
    </form>
</div>

<div th:replace="~{fragments/footer :: footer}"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script th:replace="~{fragments/navbar :: navbarScript}"></script>

<!-- Wybor czasu miejca oraz filmu -->
<script th:inline="javascript">

    const showings = /*[[${showings}]]*/ [];

    let selectedCinema = null;
    let selectedDate = null;

    const dateList = document.getElementById('dateList');
    const timeList = document.getElementById('timeList');
    const submitBtn = document.getElementById('submitBtn');
    const showingInput = document.getElementById('showingId');

    document.querySelectorAll('.cinema-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            document.querySelectorAll('.cinema-btn').forEach(b => b.classList.remove('is-selected'));
            btn.classList.add('is-selected');
            selectedCinema = parseInt(btn.dataset.cinemaId);
            selectedDate = null;
            renderDates();
            timeList.innerHTML = '<span class="text-muted">Najpierw wybierz datę ↑</span>';
            submitBtn.classList.add('d-none');
        });
    });

    function renderDates() {
        const dates = [...new Set(
            showings
                .filter(s => s.cinema.id === selectedCinema)
                .map(s => s.startTime.substring(0, 10))
        )].sort();

        if (dates.length === 0) {
            dateList.innerHTML = '<span class="text-muted">Brak seansów w tym kinie</span>';
            return;
        }
        dateList.innerHTML = dates.map(d =>
            `<button type="button" class="choice-btn date-btn" data-date="${d}">${formatDate(d)}</button>`
        ).join('');

        document.querySelectorAll('.date-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.date-btn').forEach(b => b.classList.remove('is-selected'));
                btn.classList.add('is-selected');
                selectedDate = btn.dataset.date;
                renderTimes();
                submitBtn.classList.add('d-none');
            });
        });
    }

    function renderTimes() {
        const filtered = showings.filter(s =>
            s.cinema.id === selectedCinema && s.startTime.startsWith(selectedDate));

        timeList.innerHTML = filtered.map(s => {
            const t = s.startTime.substring(11, 16);
            return `<button type="button" class="choice-btn time-btn" data-id="${s.id}">${t}</button>`;
        }).join('');

        document.querySelectorAll('.time-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.time-btn').forEach(b => b.classList.remove('is-selected'));
                btn.classList.add('is-selected');
                showingInput.value = btn.dataset.id;
                submitBtn.classList.remove('d-none');
            });
        });
    }

    function formatDate(d) {
        const [y, m, day] = d.split('-');
        return `${day}.${m}.${y}`;
    }
</script>
</body>
</html>
