<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kinoza - Twój Repertuar</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #262626;
            color: #000000;
            font-family: 'Aeonik TRIAL', sans-serif;
            margin: 0;
        }

        .custom-navbar {
            background: #FAFFBE;
            border-radius: 16px;
            margin: 20px auto;
            max-width: 1100px;
            padding: 10px 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }


        .hero-section {
            background: #FAFFBE;
            border-radius: 30px;
            max-width: 1100px;
            margin: 0 auto 60px;
            min-height: 654px;
            position: relative;
            overflow: hidden;
            display: flex;
            align-items: center;
            padding: 0 50px;
        }


        .hero-content {
            max-width: 540px;
            z-index: 5;
        }

        .hero-title {
            font-weight: 700;
            font-size: 120px;
            line-height: 1;
            margin-bottom: 30px;
            color: #000;
        }

        .hero-description {
            font-size: 18px;
            line-height: 1.2;
            margin-bottom: 40px;
            color: #000;
        }

        .btn-reserve-main {
            background: #262626;
            color: #FAFFBE;
            border-radius: 50px;
            padding: 10px 25px;
            text-decoration: none;
            display: inline-block;
            border: none;
        }

        .btn-outline-main {
            border: 1px solid #262626;
            color: #262626;
            border-radius: 50px;
            padding: 10px 25px;
            text-decoration: none;
            display: inline-block;
            margin-left: 15px;
        }

        .hero-collage {
            position: absolute;
            right: 0;
            top: 0;
            width: 62%;
            height: 100%;
            background-image: url('/images/hero-collage.jpg');
            background-size: cover;
            background-position: center;
            z-index: 1;
        }

        .repertuar-container {
            max-width: 1100px;
            margin: 0 auto;
        }

        .repertuar-title {
            color: #FAFFBE;
            letter-spacing: 2px;
            margin-bottom: 40px;
        }

        .movie-card {
            background: #FAFFBE;
            border-radius: 20px;
            border: none;
            color: #000;
            transition: transform 0.3s;
        }

        .movie-card:hover { transform: translateY(-10px); }

        .poster-img {
            width: 100%;
            height: 400px;
            object-fit: cover;
            border-radius: 15px;
        }

        .btn-reserve-small {
            border: 1px solid #000;
            color: #000;
            text-decoration: none;
            display: block;
            text-align: center;
            padding: 8px;
            border-radius: 10px;
            margin-top: 15px;
        }
    </style>
</head>
<body>

<div class="custom-navbar shadow-sm">
    <div class="d-flex gap-4 align-items-center">
        <a href="#">
            <img src="/images/Kinoza.jpg" alt="Kinoza" style="height: 35px;">
        </a>

        <a href="#">
            <img src="/images/menu.jpg" alt="Menu" style="height: 35px;">
        </a>
    </div>

    <div class="d-flex align-items-center gap-2">

        <a href="#">
            <img src="/images/search-btn.jpg" alt="Szukaj" style="height: 35px;">
        </a>

        <a href="#">
            <img src="/images/kup-bilet-btn.jpg" alt="Kup bilet" style="height: 35px;">
        </a>

        <a href="#">
            <img src="/images/user-icon.jpg" alt="User" style="height: 35px;">
        </a>

        <a href="#">
            <img src="/images/lang-btn.jpg" alt="PL" style="height: 35px;">
        </a>

    </div>
</div>


<div class="hero-section shadow-lg">
    <div class="hero-content">
        <h1 class="hero-title">Kinoza</h1>
        <p class="hero-description">
            Kinoza to nowoczesna przestrzeń kinowa, która łączy repertuar,
            bilety online i osobiste filmowe doświadczenia użytkownika w jednym miejscu.
        </p>
        <div class="hero-btns">
            <a href="#" class="btn-reserve-main shadow">Kup bilet</a>
            <a href="#movies" class="btn-outline-main">Zobacz repertuar</a>
        </div>
    </div>
    <div class="hero-collage"></div>
</div>

<div id="movies" class="repertuar-container container">
    <h2 class="repertuar-title fw-bold text-uppercase">Aktualny repertuar</h2>

    <div class="row g-4 pb-5">
        <div class="col-lg-4 col-md-6" th:each="movie : ${movies}">
            <div class="movie-card p-3 h-100">
                <img th:src="${movie.posterUrl}" class="poster-img" alt="Poster">
                <div class="pt-3">
                    <h4 class="fw-bold mb-1" th:text="${movie.title}">Tytuł</h4>
                    <p class="text-muted small mb-2" th:text="${movie.genre}">Gatunek</p>
                    <div class="fw-bold">★ <span th:text="${movie.rating}">0.0</span></div>
                    <a th:href="@{/movie/{id}(id=${movie.id})}" class="btn-reserve-small">Zarezerwuj</a>
                </div>
            </div>
        </div>
    </div>
</div>

</body>
</html>
