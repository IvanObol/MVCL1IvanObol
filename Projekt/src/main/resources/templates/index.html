<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>CinemaT - Repertuar</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f4f7f6; }
        .navbar { background-color: #1a1a1a; }
        .card { transition: 0.3s; border: none; }
        .card:hover { transform: translateY(-5px); box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
    </style>
</head>
<body>

<nav class="navbar navbar-dark mb-5">
    <div class="container">
        <a class="navbar-brand" href="#">🎬 CinemaT</a>
    </div>
</nav>

<div class="container">
    <h1 class="mb-4 text-center">Aktualny repertuar</h1>

    <div class="row">
        <div class="col-12 text-center" th:if="${movies.empty}">
            <div class="alert alert-warning">Obecnie brak filmów w bazie danych. Sprawdź plik import.sql.</div>
        </div>

        <div class="col-md-4 mb-4" th:each="movie : ${movies}">
            <div class="card h-100 shadow-sm">
                <div class="card-body">
                    <h5 class="card-title text-primary" th:text="${movie.title}">Tytuł filmu</h5>
                    <p class="card-text">
                        <strong>Gatunek:</strong> <span th:text="${movie.genre}">Gatunek</span><br>
                        <strong>Reżyser:</strong> <span th:text="${movie.director}">Reżyser</span><br>
                        <strong>Ocena:</strong> <span class="badge bg-success" th:text="${movie.rating}">0.0</span>
                    </p>
                    <a href="#" class="btn btn-outline-primary w-100">Zarezerwuj miejsce</a>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
